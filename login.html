<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaxShield – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:       #0d1117;
      --bg-surface:    #161b27;
      --bg-card:       #1c2338;
      --bg-input:      #222840;
      --bg-hover:      #252d45;

      --gold:          #e8a020;
      --gold-light:    #f0b030;
      --green:         #22c55e;
      --red:           #ef4444;
      --blue:          #3b82f6;

      --text-primary:  #f0f4ff;
      --text-secondary:#8b98b8;
      --text-muted:    #4a5568;

      --border:        rgba(255,255,255,0.07);
      --radius:        12px;
      --transition:    0.22s cubic-bezier(0.4,0,0.2,1);

      --font-display:  'Cinzel', serif;
      --font-body:     'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 14px;
    }

    /* ── Background decoration ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(232,160,32,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 520px;
    }

    /* ── Brand ──────────────────────────────────────────────── */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      background: rgba(232,160,32,0.12);
      border: 1px solid rgba(232,160,32,0.3);
      border-radius: 14px;
      margin-bottom: 1rem;
    }

    .brand-icon svg { fill: var(--gold); width: 28px; height: 28px; }

    .brand-name {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      display: block;
    }

    .brand-tagline {
      color: var(--text-secondary);
      font-size: 0.82rem;
      margin-top: 0.3rem;
    }

    /* ── Card ───────────────────────────────────────────────── */
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04);
    }

    /* ── Tab Switcher ───────────────────────────────────────── */
    .auth-tabs {
      display: flex;
      background: var(--bg-input);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
    }

    .auth-tab {
      flex: 1;
      padding: 0.55rem;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .auth-tab.active {
      background: var(--bg-card);
      color: var(--gold);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* ── Form panels ────────────────────────────────────────── */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* ── Section heading inside register ───────────────────── */
    .form-section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 1.25rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Grid ───────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
    }

    .form-grid .full { grid-column: 1 / -1; }

    /* ── Form group ─────────────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .form-label {
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.03em;
    }

    .form-label .optional {
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 0.25rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
      pointer-events: none;
    }

    .form-input,
    .form-select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 0.65rem 0.875rem 0.65rem 2.2rem;
      font-family: var(--font-body);
      font-size: 0.875rem;
      transition: var(--transition);
      outline: none;
      appearance: none;
    }

    .form-input.no-icon,
    .form-select.no-icon {
      padding-left: 0.875rem;
    }

    .form-input::placeholder { color: var(--text-muted); }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--gold);
      background: var(--bg-hover);
      box-shadow: 0 0 0 3px rgba(232,160,32,0.1);
    }

    .form-input.error { border-color: var(--red); }

    .field-error {
      font-size: 0.72rem;
      color: var(--red);
      margin-top: 0.2rem;
      display: none;
    }

    /* password toggle */
    .pass-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 1rem;
      line-height: 1;
    }

    /* ── Submit button ──────────────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1.5rem;
      background: var(--gold);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover {
      background: var(--gold-light);
      box-shadow: 0 4px 20px rgba(232,160,32,0.35);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Spinner ────────────────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0d1117;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error / success banner ─────────────────────────────── */
    .form-banner {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.84rem;
      margin-bottom: 1rem;
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .form-banner.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      display: flex;
    }

    .form-banner.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: #86efac;
      display: flex;
    }

    /* ── Password strength bar ──────────────────────────────── */
    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 0.4rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }

    .strength-label {
      font-size: 0.7rem;
      margin-top: 0.25rem;
      color: var(--text-muted);
    }

    /* ── Footer note ────────────────────────────────────────── */
    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .auth-card { padding: 1.5rem; }
    }
  </style>
</head>

<body>
<div class="page">
  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V6L12 2z"/></svg>
      </div>
      <span class="brand-name">TaxShield</span>
      <p class="brand-tagline">Smart tax tracking for Indian merchants &amp; businesses</p>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Banner (errors / success) -->
      <div class="form-banner" id="form-banner"></div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab"        onclick="switchAuthTab('register')">Create Account</button>
      </div>

      <!-- ══════════════ LOGIN FORM ══════════════ -->
      <div class="form-panel active" id="panel-login">
        <div class="form-group" style="margin-bottom:0.875rem">
          <label class="form-label">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input id="login-username" class="form-input" type="text"
                   placeholder="your_username" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input id="login-password" class="form-input" type="password"
                   placeholder="••••••••" autocomplete="current-password" />
            <button class="pass-toggle" type="button"
                    onclick="togglePass('login-password', this)">👁</button>
          </div>
        </div>

        <button class="btn-submit" id="btn-login" onclick="doLogin()">
          <span class="spinner" id="login-spinner"></span>
          <span id="login-btn-text">Sign In</span>
        </button>

        <p class="auth-footer">Don't have an account?
          <a href="#" onclick="switchAuthTab('register')"
             style="color:var(--gold);text-decoration:none">Create one free</a>
        </p>
      </div>

      <!-- ══════════════ REGISTER FORM ══════════════ -->
      <div class="form-panel" id="panel-register">

        <!-- ── Auth credentials ── -->
        <div class="form-section-label">Account Credentials</div>
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Username *</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input id="reg-username" class="form-input" type="text"
                     placeholder="merchant_name" autocomplete="username"
                     oninput="clearError(this)" />
            </div>
            <span class="field-error" id="err-username"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Password *</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input id="reg-password" class="form-input" type="password"
                     placeholder="Min 6 characters"
                     autocomplete="new-password"
                     oninput="checkStrength(this.value)" />
              <button class="pass-toggle" type="button"
                      onclick="togglePass('reg-password', this)">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-label" id="strength-label"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input id="reg-confirm" class="form-input" type="password"
                     placeholder="Re-enter password"
                     autocomplete="new-password"
                     oninput="clearError(this)" />
            </div>
            <span class="field-error" id="err-confirm"></span>
          </div>
        </div>

        <!-- ── Personal info ── -->
        <div class="form-section-label">Personal Information</div>
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Full Name *</label>
            <div class="input-wrap">
              <span class="input-icon">🙍</span>
              <input id="reg-name" class="form-input" type="text"
                     placeholder="Ravi Kumar" oninput="clearError(this)" />
            </div>
            <span class="field-error" id="err-name"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Phone Number *</label>
            <div class="input-wrap">
              <span class="input-icon">📞</span>
              <input id="reg-phone" class="form-input" type="tel"
                     placeholder="9876543210" oninput="clearError(this)" />
            </div>
            <span class="field-error" id="err-phone"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Email <span class="optional">(optional)</span></label>
            <div class="input-wrap">
              <span class="input-icon">✉️</span>
              <input id="reg-email" class="form-input" type="email"
                     placeholder="ravi@example.com" />
            </div>
          </div>
        </div>

        <!-- ── Business profile ── -->
        <div class="form-section-label">Business Profile</div>
        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Income / Occupation Type *</label>
            <div class="input-wrap">
              <span class="input-icon">💼</span>
              <select id="reg-income-type" class="form-select"
                      onchange="updateBusinessTypes()">
                <option value="">Select type…</option>
                <option value="Business">Business Owner</option>
                <option value="Salary">Salaried Employee</option>
                <option value="Freelance">Freelancer / Consultant</option>
                <option value="Rental">Rental Income</option>
                <option value="Investment">Investment / Trading</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <span class="field-error" id="err-income-type"></span>
          </div>

          <div class="form-group full">
            <label class="form-label">Business / Work Type *</label>
            <div class="input-wrap">
              <span class="input-icon">🏪</span>
              <select id="reg-business-type" class="form-select no-icon"
                      style="padding-left:2.2rem">
                <option value="">Select first an income type…</option>
              </select>
            </div>
            <span class="field-error" id="err-business-type"></span>
          </div>

          <div class="form-group full">
            <label class="form-label">Shop / Business Name <span class="optional">(optional)</span></label>
            <div class="input-wrap">
              <span class="input-icon">🏬</span>
              <input id="reg-shop" class="form-input" type="text"
                     placeholder="Ravi General Stores" />
            </div>
          </div>

          <div class="form-group full">
            <label class="form-label">GSTIN <span class="optional">(optional — 15 chars)</span></label>
            <div class="input-wrap">
              <span class="input-icon">🪪</span>
              <input id="reg-gstin" class="form-input" type="text"
                     placeholder="27ABCDE1234F1Z5" maxlength="15"
                     style="text-transform:uppercase"
                     oninput="this.value=this.value.toUpperCase()" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">City <span class="optional">(optional)</span></label>
            <div class="input-wrap">
              <span class="input-icon">📍</span>
              <input id="reg-city" class="form-input" type="text" placeholder="Salem" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">State <span class="optional">(optional)</span></label>
            <div class="input-wrap">
              <span class="input-icon">🗺️</span>
              <select id="reg-state" class="form-select" style="padding-left:2.2rem">
                <option value="">Select state…</option>
                <option>Andhra Pradesh</option><option>Assam</option>
                <option>Bihar</option><option>Delhi</option>
                <option>Goa</option><option>Gujarat</option>
                <option>Haryana</option><option>Himachal Pradesh</option>
                <option>Jharkhand</option><option>Karnataka</option>
                <option>Kerala</option><option>Madhya Pradesh</option>
                <option>Maharashtra</option><option>Manipur</option>
                <option>Meghalaya</option><option>Odisha</option>
                <option>Punjab</option><option>Rajasthan</option>
                <option>Tamil Nadu</option><option>Telangana</option>
                <option>Uttar Pradesh</option><option>Uttarakhand</option>
                <option>West Bengal</option><option>Other</option>
              </select>
            </div>
          </div>
        </div>

        <button class="btn-submit" id="btn-register" onclick="doRegister()">
          <span class="spinner" id="reg-spinner"></span>
          <span id="reg-btn-text">Create My Account</span>
        </button>

        <p class="auth-footer">Already have an account?
          <a href="#" onclick="switchAuthTab('login')"
             style="color:var(--gold);text-decoration:none">Sign in</a>
        </p>
      </div>
      <!-- end register panel -->

    </div><!-- end card -->
  </div><!-- end wrapper -->
</div><!-- end page -->

<script>
"use strict";

const API = "http://127.0.0.1:8000";

// ── Business type options per income type ─────────────────────────────────
const BUSINESS_TYPES = {
  Business:   ["Retail Shop","Wholesale","Restaurant / Food","Manufacturing",
               "Service Provider","E-Commerce","Agriculture","Transport","Other"],
  Salary:     ["Private Company Employee","Government Employee",
               "Bank / Finance Employee","IT / Software Employee","Other"],
  Freelance:  ["IT / Developer","Designer","Content Creator","Tutor / Trainer",
               "Consultant","Other"],
  Rental:     ["Residential Property","Commercial Property","Vehicle Rental","Other"],
  Investment: ["Stock Market","Mutual Funds","Cryptocurrency","Fixed Deposit","Other"],
  Other:      ["Other"],
};

// ── Tab switcher ──────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll(".auth-tab").forEach((b, i) => {
    b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
  });
  document.getElementById("panel-login").classList.toggle("active", tab === "login");
  document.getElementById("panel-register").classList.toggle("active", tab === "register");
  hideBanner();
}

// ── Dynamic business type dropdown ───────────────────────────────────────
function updateBusinessTypes() {
  const incomeType = document.getElementById("reg-income-type").value;
  const select     = document.getElementById("reg-business-type");
  const options    = BUSINESS_TYPES[incomeType] || [];

  select.innerHTML = options.length
    ? options.map(o => `<option value="${o}">${o}</option>`).join("")
    : `<option value="">Select income type first…</option>`;
}

// ── Password visibility toggle ────────────────────────────────────────────
function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === "password") {
    input.type = "text";
    btn.textContent = "🙈";
  } else {
    input.type = "password";
    btn.textContent = "👁";
  }
}

// ── Password strength ─────────────────────────────────────────────────────
function checkStrength(val) {
  const fill  = document.getElementById("strength-fill");
  const label = document.getElementById("strength-label");
  let score = 0;
  if (val.length >= 6)                        score++;
  if (val.length >= 10)                       score++;
  if (/[A-Z]/.test(val))                      score++;
  if (/[0-9]/.test(val))                      score++;
  if (/[^A-Za-z0-9]/.test(val))              score++;

  const levels = [
    { w: "0%",   bg: "transparent", txt: "" },
    { w: "25%",  bg: "#ef4444",     txt: "Weak" },
    { w: "50%",  bg: "#f97316",     txt: "Fair" },
    { w: "75%",  bg: "#eab308",     txt: "Good" },
    { w: "100%", bg: "#22c55e",     txt: "Strong" },
  ];
  const lv = levels[Math.min(score, 4)];
  fill.style.width      = lv.w;
  fill.style.background = lv.bg;
  label.textContent     = lv.txt;
  label.style.color     = lv.bg;
}

// ── Banner helpers ────────────────────────────────────────────────────────
function showBanner(msg, type = "error") {
  const el = document.getElementById("form-banner");
  el.className  = `form-banner ${type}`;
  el.innerHTML  = `<span>${type === "error" ? "✕" : "✓"}</span><span>${msg}</span>`;
  el.style.display = "flex";
}

function hideBanner() {
  const el = document.getElementById("form-banner");
  el.style.display = "none";
  el.className = "form-banner";
}

function setFieldError(id, msg) {
  const errEl = document.getElementById(`err-${id}`);
  const input = document.getElementById(`reg-${id}`);
  if (errEl) { errEl.textContent = msg; errEl.style.display = msg ? "block" : "none"; }
  if (input)  input.classList.toggle("error", !!msg);
}

function clearError(input) {
  input.classList.remove("error");
  const errEl = document.getElementById(`err-${input.id.replace("reg-","")}`);
  if (errEl) errEl.style.display = "none";
  hideBanner();
}

function setLoading(btnId, spinnerId, textId, loading, text = "") {
  const btn     = document.getElementById(btnId);
  const spinner = document.getElementById(spinnerId);
  const label   = document.getElementById(textId);
  btn.disabled        = loading;
  spinner.style.display = loading ? "block" : "none";
  if (text) label.textContent = text;
}

// ── Store session ─────────────────────────────────────────────────────────
function saveSession(data) {
  sessionStorage.setItem("ts_token",    data.access_token);
  sessionStorage.setItem("ts_user_id",  data.user_id);
  sessionStorage.setItem("ts_username", data.username);
  sessionStorage.setItem("ts_name",     data.full_name);
  sessionStorage.setItem("ts_income",   data.income_type);
  sessionStorage.setItem("ts_biz",      data.business_type);
  sessionStorage.setItem("ts_shop",     data.shop_name || "");
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
async function doLogin() {
  hideBanner();

  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value;

  if (!username) return showBanner("Please enter your username.");
  if (!password) return showBanner("Please enter your password.");

  setLoading("btn-login", "login-spinner", "login-btn-text", true, "Signing in…");

  try {
    const res = await fetch(`${API}/auth/login`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      showBanner(data.detail || "Login failed. Check your credentials.");
      return;
    }

    saveSession(data);
    showBanner(`Welcome back, ${data.full_name}! Redirecting…`, "success");

    setTimeout(() => { window.location.href = "index.html"; }, 800);

  } catch (err) {
    showBanner("Cannot connect to server. Make sure the backend is running.");
  } finally {
    setLoading("btn-login", "login-spinner", "login-btn-text", false, "Sign In");
  }
}

// ── REGISTER ──────────────────────────────────────────────────────────────
async function doRegister() {
  hideBanner();

  // Clear all field errors
  ["username","confirm","name","phone","income-type","business-type"].forEach(id =>
    setFieldError(id, "")
  );

  const username      = document.getElementById("reg-username").value.trim().toLowerCase();
  const password      = document.getElementById("reg-password").value;
  const confirm       = document.getElementById("reg-confirm").value;
  const full_name     = document.getElementById("reg-name").value.trim();
  const phone         = document.getElementById("reg-phone").value.trim();
  const email         = document.getElementById("reg-email").value.trim() || null;
  const income_type   = document.getElementById("reg-income-type").value;
  const business_type = document.getElementById("reg-business-type").value;
  const shop_name     = document.getElementById("reg-shop").value.trim()  || null;
  const gstin         = document.getElementById("reg-gstin").value.trim() || null;
  const city          = document.getElementById("reg-city").value.trim()  || null;
  const state         = document.getElementById("reg-state").value        || null;

  // ── Client-side validation ────────────────────────────────────────────
  let hasError = false;

  if (username.length < 3) {
    setFieldError("username", "Username must be at least 3 characters."); hasError = true;
  }
  if (password.length < 6) {
    showBanner("Password must be at least 6 characters."); hasError = true;
  }
  if (password !== confirm) {
    setFieldError("confirm", "Passwords do not match."); hasError = true;
  }
  if (!full_name) {
    setFieldError("name", "Full name is required."); hasError = true;
  }
  if (phone.length < 10) {
    setFieldError("phone", "Enter a valid 10-digit phone number."); hasError = true;
  }
  if (!income_type) {
    setFieldError("income-type", "Please select your income type."); hasError = true;
  }
  if (!business_type) {
    setFieldError("business-type", "Please select your business / work type."); hasError = true;
  }
  if (gstin && gstin.length !== 15) {
    showBanner("GSTIN must be exactly 15 characters."); hasError = true;
  }

  if (hasError) return;

  setLoading("btn-register", "reg-spinner", "reg-btn-text", true, "Creating account…");

  try {
    const res = await fetch(`${API}/auth/register`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username, password, confirm_password: confirm,
        full_name, phone, email,
        income_type, business_type,
        shop_name, gstin, city, state,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      // Show field-specific errors if returned
      if (data.detail?.includes("Username")) {
        setFieldError("username", data.detail);
      } else if (data.detail?.includes("phone")) {
        setFieldError("phone", data.detail);
      } else {
        showBanner(data.detail || "Registration failed. Please try again.");
      }
      return;
    }

    saveSession(data);
    showBanner(`Account created! Welcome, ${data.full_name}. Redirecting…`, "success");

    setTimeout(() => { window.location.href = "index.html"; }, 1000);

  } catch (err) {
    showBanner("Cannot connect to server. Make sure the backend is running.");
  } finally {
    setLoading("btn-register", "reg-spinner", "reg-btn-text", false, "Create My Account");
  }
}

// ── Redirect if already logged in ─────────────────────────────────────────
if (sessionStorage.getItem("ts_token")) {
  window.location.href = "index.html";
}

// ── Allow Enter key on login form ─────────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const activePanel = document.querySelector(".form-panel.active");
    if (activePanel?.id === "panel-login") doLogin();
  }
});
</script>
